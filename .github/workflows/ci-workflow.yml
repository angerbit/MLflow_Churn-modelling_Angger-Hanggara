name: CI - Churn Modeling Build and Deploy Docker

on:
  push:
    branches:
      - main
  workflow_dispatch:
  pull_request:
    branches:
      - main

env:
  MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
  DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
  DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
  DAGSHUB_REPO: ${{ secrets.DAGSHUB_REPO }}
  DAGSHUB_OWNER: ${{ secrets.DAGSHUB_OWNER }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: List directory structure (debug)
        run: |
          pwd
          ls -la
          echo "---"
          find . -name "*.py" -o -name "MLproject" -o -name "*.csv" | head -20

      - name: Build Docker image from MLProject
        run: |
          mlflow build-docker -m . -n ${{ secrets.DOCKER_IMAGE_NAME }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_IMAGE_NAME }}

      - name: Train model using MLflow run
        run: |
          mlflow run . --env-manager=local \
            --experiment-name churn_modeling \
            -P x-data-path=X_preprocessed.csv \
            -P y-data-path=y_preprocessed.csv \
            -P test-size=0.2 \
            -P random-state=42 \
            -P max-iter=1000

      - name: Upload training artifacts
        uses: actions/upload-artifact@v4
        with:
          name: training-artifacts
          path: models/
          retention-days: 30

      - name: Upload MLflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: mlruns/
          retention-days: 30
