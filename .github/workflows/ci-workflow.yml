name: CI — Churn Model Training

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  train-and-log:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'
          cache: 'pip'

      - name: Install dependensi
        run: pip install -r requirements.txt

      - name: Jalankan training & log ke MLflow/DagsHub
        env:
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME}}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN}}
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          python modelling.py \
            --x-data-path X_preprocessed.csv \
            --y-data-path y_preprocessed.csv \
            --experiment-name churn_modeling_ci

      - name: Upload artefak ke GitHub
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts-${{ github.run_number }}
          path: models/
          retention-days: 30


      - name: Build & push Docker image
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          DAGSHUB_USERNAME: ${{secrets.DAGSHUB_USERNAME}}
          DAGSHUB_TOKEN: ${{secrets.DAGSHUB_TOKEN}}
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

          MODEL_VERSION=$(python modelling.py --get-model-version churn_model)
          echo "Latest model version: $MODEL_VERSION"

          mkdir -p /tmp/mlflow-docker
          mlflow models generate-dockerfile \
            --model-uri "models:/churn_model/$MODEL_VERSION" \
            --python-version 3.12.7 \
            -d /tmp/mlflow-docker

            docker build \
            -t "DOCKER_USERNAME/churn-model:${{github.run_number}}" \
            -t "DOCKER_USERNAME/churn-model:latest" \ 
            /tmp/mlflow-docker

          docker push "$DOCKER_USERNAME/churn-model:${{ github.run_number }}"
          docker push "$DOCKER_USERNAME/churn-model:latest"













          
