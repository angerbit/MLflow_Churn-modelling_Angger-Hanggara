name: CI - Churn Modeling Build and Deploy Docker

on:
  push:
    branches:
      - main
  workflow_dispatch:
  pull_request:
    branches:
      - main

env:
  MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
  DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
  DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
  DAGSHUB_REPO: ${{ secrets.DAGSHUB_REPO }}
  DAGSHUB_OWNER: ${{ secrets.DAGSHUB_OWNER }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'
          cache: 'pip'

      - name: Install MLflow CLI and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow scikit-learn pandas numpy matplotlib dagshub joblib

      - name: Build Docker image
        run: |
          # Buat Dockerfile
          cat > Dockerfile << 'EOF'
          FROM python:3.12.7-slim
          WORKDIR /app
          COPY requirements.txt .
          RUN pip install --no-cache-dir -r requirements.txt
          COPY . .
          CMD ["python", "modelling.py"]
          EOF
          
          # Buat requirements.txt jika belum ada
          if [ ! -f requirements.txt ]; then
            echo "mlflow>=2.0.0" > requirements.txt
            echo "scikit-learn>=1.3.0" >> requirements.txt
            echo "pandas>=2.0.0" >> requirements.txt
            echo "numpy>=1.24.0" >> requirements.txt
            echo "matplotlib>=3.7.0" >> requirements.txt
            echo "dagshub>=0.3.0" >> requirements.txt
            echo "joblib>=1.3.0" >> requirements.txt
          fi
          
          docker build -t ${{ secrets.DOCKER_IMAGE_NAME }} .

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_IMAGE_NAME }}

      - name: Train model using MLflow run
        run: |
          mlflow run . --env-manager=local \
            --experiment-name churn_modeling \
            -P x-data-path=X_preprocessed.csv \
            -P y-data-path=y_preprocessed.csv \
            -P test-size=0.2 \
            -P random-state=42 \
            -P max-iter=1000
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}

      - name: Upload training artifacts
        uses: actions/upload-artifact@v3
        with:
          name: training-artifacts
          path: models/
          retention-days: 30

      - name: Upload MLflow artifacts
        uses: actions/upload-artifact@v3
        with:
          name: mlflow-artifacts
          path: mlruns/
          retention-days: 30
