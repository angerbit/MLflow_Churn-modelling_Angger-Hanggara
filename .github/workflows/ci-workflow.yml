name: CI - Churn Modeling Build and Deploy Docker

on:
  push:
    branches:
      - main
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'
          cache: 'pip'

      - name: Install MLflow CLI
        run: |
          python -m pip install --upgrade pip
          pip install mlflow

      - name: Build Docker image from MLProject
        working-directory: MLProject
        run: |
          python -m mlflow build-docker -m . -n ${{ secrets.DOCKER_IMAGE_NAME }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_IMAGE_NAME }}

      - name: Train model and collect artifacts
        working-directory: MLProject
        run: |
          python modelling.py \
          --x-data-path X_preprocessed.csv 
          --y-data-path y_preprocessed.csv 
          --test-size 0.2 
          --random-state 42 
          --max-iter 1000 
          --experiment-name churn_modeling

      - name: Upload training artifacts
        uses: actions/upload-artifact@v4
        with:
          name: training-artifacts
          path: MLProject/models/
          retention-days: 30
