name: CI - Churn Modeling Build and Deploy Docker

on:
  push:
    branches: [main]
  workflow_dispatch:
  pull_request:
    branches: [main]

env:
  MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
  DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
  DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
  DAGSHUB_REPO: ${{ secrets.DAGSHUB_REPO }}
  DAGSHUB_OWNER: ${{ secrets.DAGSHUB_OWNER }}

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    # Izin write ke repo untuk menyimpan artefak
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── 2. Setup Python ────────────────────────────────────────────────────
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"
          cache: "pip"

      # ── 3. Install dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow scikit-learn pandas numpy matplotlib dagshub joblib

      # 4. Training the model
      - name: Train model via MLflow
        run: |
          mlflow run ./MLprojects \
            --env-manager=local \
            --experiment-name churn_model \
            -P x-data-path=X_preprocessed.csv \
            -P y-data-path=y_preprocessed.csv \
            -P test-size=0.2 \
            -P random-state=42 \
            -P max-iter=1000
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}

      # ── 5. Simpan artefak ke repo GitHub yang sama ────────────────────────
      - name: Commit and push artifacts to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
          # Tambahkan folder artefak hasil training
          git add MLprojects/models/   || true
          git add MLprojects/mlruns/   || true
      
          # Cek apakah ada perubahan sebelum commit
          if git diff --staged --quiet; then
            echo "Tidak ada artefak baru, skip commit."
          else
            git commit -m "ci: update training artifacts [skip ci]"
            # Pull latest changes before pushing
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      # ── 6. Build Docker image via mlflow build-docker ─────────────────────
      - name: Build Docker image with MLflow
        run: |
          mlflow models build-docker \
            --model-uri "models:/churn_model/latest" \
            --name ${{ secrets.DOCKER_IMAGE_NAME }}
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}

      # ── 7. Login ke Docker Hub ─────────────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # ── 8. Push image ke Docker Hub ────────────────────────────────────────
      - name: Push Docker image to Docker Hub
        run: docker push ${{ secrets.DOCKER_IMAGE_NAME }}
