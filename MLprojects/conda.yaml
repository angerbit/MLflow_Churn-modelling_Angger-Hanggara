name: mlflow-env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12.7
  - pip=24.2
  - numpy=2.4.6
  - pandas=2.3.3
  - matplotlib=3.10.1
  - scikit-learn=1.8.0
  - joblib=1.4.2
  - scipy=1.17.1
  - psutil=7.2.2
  - pip:
    - mlflow==2.19.0
    - dagshub==0.3.65
    - cloudpickle==3.1.2
    - pyarrow==18.1.0
